services:
  # 로컬 개발용: Vite dev 서버 + 소스 핫 리로드
  dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - path: .env.local
        required: false
    environment:
      - CHOKIDAR_USEPOLLING=true

  # 프로덕션 미리보기용: 빌드된 정적 파일을 nginx로 서빙
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_KAKAO_MAP_API_KEY: ${VITE_KAKAO_MAP_API_KEY}
    ports:
      # 8080은 로컬 Firestore 에뮬레이터 기본 포트와 겹치므로 8081 사용.
      # 실서버에 올릴 땐 이 포트를 그 환경의 리버스 프록시/터널이 가리키게 하면 된다
      # (예: Cloudflare Tunnel로 localhost:8081을 외부에 공개 — HTTPS는 프록시/터널 쪽이 처리).
      - "8081:80"
    restart: unless-stopped

volumes:
  node_modules:
