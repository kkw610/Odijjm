server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router가 클라이언트 사이드에서 라우팅하므로 알 수 없는 경로는 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 결과 카드에 카카오맵을 실제로 그려 넣어 PNG로 캡처하는 헤드리스 브라우저 렌더 서비스.
    # 페이지 로드 + 지도 타일 로딩 + 스크린샷까지 시간이 좀 걸려서 타임아웃을 넉넉히 잡는다.
    location /render/ {
        proxy_pass http://render:3000/render/;
        proxy_read_timeout 45s;
        proxy_send_timeout 45s;
    }
}
